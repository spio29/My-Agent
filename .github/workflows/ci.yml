name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: snok/install-poetry@v1
        with:
          python-version: 3.11
      - name: Install dependencies
        run: poetry install --no-root
      - name: Run unit tests
        run: poetry run pytest

  api-image-smoke:
    name: API image smoke tests
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile.api -t spio-api-ci .
      - name: Run planner smoke tests in API image
        run: docker run --rm spio-api-ci python -m pytest -q tests/test_planner_ai.py

  ui:
    name: UI e2e
    runs-on: ubuntu-latest
    needs: [backend, api-image-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
      - name: Install UI deps
        run: |
          cd ui
          npm install
          npx playwright install --with-deps
      - name: Run Playwright e2e
        run: |
          cd ui
          npm run e2e
