services:
  redis:
    image: redis:7-alpine
    container_name: spio-redis
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: always
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: spio-api
    ports:
      - 8000:8000
    extra_hosts:
      - host.docker.internal:host-gateway
    env_file: .env
    environment:
      - CORS_ALLOW_ORIGINS=*
    depends_on: [redis]
    restart: always
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    container_name: spio-operator-ui
    ports:
      - 5178:3000
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_BASE=/api
      - NEXT_PUBLIC_API_AUTH_HEADER=${NEXT_PUBLIC_API_AUTH_HEADER:-}
      - NEXT_PUBLIC_API_AUTH_SCHEME=${NEXT_PUBLIC_API_AUTH_SCHEME:-}
      - NEXT_PUBLIC_API_TOKEN=${NEXT_PUBLIC_API_TOKEN:-}
      - NEXT_INTERNAL_API_ORIGIN=http://api:8000
      - NEXT_API_PROXY_AUTH_HEADER=${AUTH_TOKEN_HEADER:-Authorization}
      - NEXT_API_PROXY_AUTH_SCHEME=${AUTH_TOKEN_SCHEME:-Bearer}
      - NEXT_API_PROXY_TOKEN=${NEXT_PUBLIC_API_TOKEN:-}
    depends_on: [api]
    restart: always
  unit-agency:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: spio-unit-agency
    env_file: .env
    environment:
      - AGENT_POOL=agency
    depends_on: [redis, api]
    restart: always
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: spio-scheduler
    env_file: .env
    depends_on: [redis, api]
    restart: always
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: spio-worker
    env_file: .env
    environment:
      - AGENT_POOL=global
    depends_on: [redis, api]
    restart: always
  connector:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: spio-connector
    command: ["python", "-m", "app.services.connector.main"]
    env_file: .env
    environment:
      - AGENT_POOL=connector
    depends_on: [redis, api]
    restart: always
volumes:
  redis-data:
